spring:
  main:
    web-application-type: servlet
  datasource:
    url: jdbc:h2:mem:travelbox_test_${random.uuid};MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  flyway:
    enabled: false

app:
  security:
    jwt:
      secret: test-secret-key-for-jwt-token-validation-123456789
      access-token-minutes: 60
      refresh-token-days: 7
    rate-limit:
      auth:
        enabled: false
  cors:
    allowed-origins: http://localhost:8080
  payments:
    provider: mock
    currency: PEN
  reservations:
    expiration-check-ms: 10000
  notifications:
    provider: mock
  auth:
    email-provider: mock
  firebase:
    enabled: false
    user-migration:
      enabled: false
  translation:
    provider: local
    allow-fallback: true
