spring:
  main:
    web-application-type: servlet
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true

app:
  security:
    jwt:
      secret: test-secret-key-for-jwt-token-validation-123456789
      access-token-minutes: 60
      refresh-token-days: 7
    rate-limit:
      auth:
        enabled: false
  cors:
    allowed-origins: http://localhost:8080
  payments:
    provider: mock
    currency: PEN
  reservations:
    expiration-check-ms: 10000
    duplicate-window-seconds: 0
  notifications:
    provider: mock
  auth:
    email-provider: mock
  firebase:
    enabled: false
    user-migration:
      enabled: false
  translation:
    provider: local
    allow-fallback: true
