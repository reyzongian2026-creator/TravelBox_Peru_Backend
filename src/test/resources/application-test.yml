spring:
  main:
    web-application-type: servlet
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  h2:
    console:
      enabled: false

app:
  security:
    jwt:
      secret: test-secret-key-for-jwt-token-validation-123456789
      access-token-minutes: 60
      refresh-token-days: 7
    rate-limit:
      auth:
        enabled: false
  cors:
    allowed-origins: http://localhost:8080
  payments:
    provider: mock
    currency: PEN
  reservations:
    expiration-check-ms: 10000
    duplicate-window-seconds: 0
  notifications:
    provider: mock
  auth:
    email-provider: mock
  translation:
    provider: local
    allow-fallback: true
