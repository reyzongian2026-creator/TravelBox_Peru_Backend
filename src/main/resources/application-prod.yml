spring:
  config:
    activate:
      on-profile: prod
  cloud:
    azure:
      credential:
        client-id: ${AZURE_CLIENT_ID:}
        client-secret: ${AZURE_CLIENT_SECRET:}
      profile:
        tenant-id: ${AZURE_TENANT_ID:}
      keyvault:
        secret:
          property-source-enabled: ${AZURE_KEYVAULT_ENABLED:true}
          property-sources:
            - endpoint: ${AZURE_KEYVAULT_ENDPOINT:https://kvtravelboxpe.vault.azure.net/}
  datasource:
    url: ${tbx-back-db-url:${DB_URL:}}
    username: ${tbx-back-db-username:${DB_USERNAME:}}
    password: ${tbx-back-db-password:${DB_PASSWORD:}}
    hikari:
      connection-timeout: 60000
      validation-timeout: 10000
      initialization-fail-timeout: 0
  flyway:
    enabled: true
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  mail:
    host: ${tbx-back-smtp-host:${APP_SMTP_HOST:}}
    port: ${tbx-back-smtp-port:${APP_SMTP_PORT:587}}
    username: ${tbx-back-smtp-username:${APP_SMTP_USERNAME:}}
    password: ${tbx-back-smtp-password:${APP_SMTP_PASSWORD:}}
    properties:
      mail:
        smtp:
          auth: ${tbx-back-smtp-auth:${APP_SMTP_AUTH:true}}
          starttls:
            enable: ${tbx-back-smtp-starttls:${APP_SMTP_STARTTLS:true}}

app:
  cors:
    allowed-origins: ${tbx-back-cors-allowed-origins:https://inkavoy.pe,https://www.inkavoy.pe,https://api.inkavoy.pe}
  security:
    jwt:
      secret: ${tbx-back-jwt-secret:${APP_JWT_SECRET:}}
    encryption-key: ${tbx-back-encryption-key:}
  notifications:
    provider: in-app
  translation:
    provider: ${APP_TRANSLATION_PROVIDER:azure}
    allow-fallback: true
    cache-seconds: 43200
    azure:
      api-key: ${tbx-back-translation-azure-api-key:}
      region: ${tbx-back-translation-azure-region:eastus}
    google:
      api-key: ${tbx-back-translation-google-api-key:${APP_TRANSLATION_GOOGLE_API_KEY:}}
  email:
    provider: ${tbx-back-email-provider:${APP_EMAIL_PROVIDER:graph}}
    from-address: ${tbx-back-email-from-address:${APP_EMAIL_FROM_ADDRESS:}}
    from-name: ${APP_EMAIL_FROM_NAME:InkaVoy Peru}
    graph-tenant-id: ${tbx-back-email-graph-tenant-id:}
    graph-client-id: ${tbx-back-email-graph-client-id:}
    graph-client-secret: ${tbx-back-email-graph-client-secret:}
    queue:
      enabled: ${tbx-back-email-queue-enabled:${APP_EMAIL_QUEUE_ENABLED:true}}
  auth:
    email-provider: ${tbx-back-auth-email-provider:${tbx-back-email-provider:${APP_AUTH_EMAIL_PROVIDER:graph}}}
  routing:
    provider: ${APP_ROUTING_PROVIDER:azure}
    allow-mock-fallback: false
    azure:
      base-url: ${APP_ROUTING_AZURE_BASE_URL:https://atlas.microsoft.com}
      api-key: ${tbx-back-routing-azure-maps-key:${tbx-back-azure-maps-api-key:}}
    google:
      api-key: ${tbx-back-routing-google-api-key:${APP_ROUTING_GOOGLE_API_KEY:}}
  payments:
    provider: ${APP_PAYMENT_PROVIDER:izipay}
    force-cash-only: ${APP_PAYMENTS_FORCE_CASH_ONLY:false}
    allow-mock-confirmation: ${APP_PAYMENTS_ALLOW_MOCK_CONFIRMATION:false}
    izipay:
      merchant-code: ${tbx-back-payments-izipay-merchant-code:}
      public-key: ${tbx-back-payments-izipay-public-key:}
      hash-key: ${tbx-back-payments-izipay-hash-key:}
      api-user: ${tbx-back-payments-izipay-api-user:}
      api-password: ${tbx-back-payments-izipay-api-password:}
      api-base-url: ${tbx-back-payments-izipay-api-base-url:https://api.micuentaweb.pe}
      checkout-script-url: ${tbx-back-payments-izipay-checkout-script-url:https://static.micuentaweb.pe/static/js/krypton-client/V4.0/stable/kr-payment-form.min.js}
      request-source: ${APP_IZIPAY_REQUEST_SOURCE:EC}
      token-path: ${APP_IZIPAY_TOKEN_PATH:/v1/tokens/session}
  bootstrap:
    enabled: false
    seed-operational-demo: false
    minimal-seed-only: false
    quick-seed: false
azure:
  storage:
    images:
      connection-string: ${tbx-back-azure-storage-images-connection-string:${AZURE_STORAGE_IMAGES_CONNECTION_STRING:}}
      url-base: ${AZURE_STORAGE_IMAGES_URL_BASE:}
      container:
        images: ${AZURE_STORAGE_IMAGES_CONTAINER:travelbox-images}
        profiles: ${AZURE_STORAGE_PROFILES_CONTAINER:travelbox-profiles}
        warehouses: ${AZURE_STORAGE_WAREHOUSES_CONTAINER:travelbox-warehouses}
        documents: ${AZURE_STORAGE_DOCUMENTS_CONTAINER:travelbox-documents}
        evidences: ${AZURE_STORAGE_EVIDENCES_CONTAINER:travelbox-evidences}
    reports:
      connection-string: ${tbx-back-azure-storage-reports-connection-string:${AZURE_STORAGE_REPORTS_CONNECTION_STRING:}}
      url-base: ${AZURE_STORAGE_REPORTS_URL_BASE:}
      container:
        reports: ${AZURE_STORAGE_REPORTS_CONTAINER:travelbox-reports}
        exports: ${AZURE_STORAGE_EXPORTS_CONTAINER:travelbox-exports}
