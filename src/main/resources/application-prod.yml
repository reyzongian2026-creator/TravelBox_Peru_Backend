spring:
  config:
    activate:
      on-profile: prod
  cloud:
    azure:
      credential:
        client-id: ${AZURE_CLIENT_ID:}
        client-secret: ${AZURE_CLIENT_SECRET:}
      profile:
        tenant-id: ${AZURE_TENANT_ID:}
      keyvault:
        secret:
          property-source-enabled: true
          property-sources:
            - endpoint: ${AZURE_KEYVAULT_ENDPOINT:https://kvtravelboxpe.vault.azure.net/}
  datasource:
    url: ${tbx-back-db-url:}
    username: ${tbx-back-db-username:}
    password: ${tbx-back-db-password:}
    hikari:
      connection-timeout: 60000
      validation-timeout: 10000
      initialization-fail-timeout: 0
  flyway:
    enabled: true
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: none
  mail:
    host: ${tbx-back-smtp-host:}
    port: ${tbx-back-smtp-port:587}
    username: ${tbx-back-smtp-username:}
    password: ${tbx-back-smtp-password:}
    properties:
      mail:
        smtp:
          auth: ${tbx-back-smtp-auth:true}
          starttls:
            enable: ${tbx-back-smtp-starttls:true}

app:
  cors:
    allowed-origins: ${tbx-back-cors-allowed-origins:http://localhost:5173,http://localhost:58900,http://127.0.0.1:58900,https://travelbox.pe,https://www.travelbox.pe}
  security:
    jwt:
      secret: ${tbx-back-jwt-secret:}
    encryption-key: ${tbx-back-encryption-key:}
  notifications:
    provider: mock
  translation:
    provider: ${APP_TRANSLATION_PROVIDER:azure}
    allow-fallback: true
    cache-seconds: 43200
    azure:
      api-key: ${tbx-back-translation-azure-api-key:}
      region: ${tbx-back-translation-azure-region:eastus}
    google:
      api-key: ${tbx-back-translation-google-api-key:}
  email:
    provider: ${tbx-back-email-provider:smtp}
    from-address: ${tbx-back-email-from-address:}
    from-name: ${APP_EMAIL_FROM_NAME:TravelBox Peru}
    graph-tenant-id: ${tbx-back-email-graph-tenant-id:}
    graph-client-id: ${tbx-back-email-graph-client-id:}
    graph-client-secret: ${tbx-back-email-graph-client-secret:}
    queue:
      enabled: ${tbx-back-email-queue-enabled:true}
  auth:
    email-provider: ${tbx-back-auth-email-provider:mock}
  routing:
    provider: ${APP_ROUTING_PROVIDER:osrm}
    allow-mock-fallback: true
    azure:
      api-key: ${tbx-back-azure-maps-api-key:}
    google:
      api-key: ${tbx-back-routing-google-api-key:}
  payments:
    provider: culqi
    force-cash-only: false
    allow-mock-confirmation: false
  firebase:
    enabled: ${tbx-back-firebase-enabled:false}
    project-id: ${tbx-back-firebase-project-id:}
    storage-bucket: ${tbx-back-firebase-storage-bucket:}
  storage:
    images:
      connection-string: ${tbx-back-azure-storage-images-connection-string:}
    reports:
      connection-string: ${tbx-back-azure-storage-reports-connection-string:}
