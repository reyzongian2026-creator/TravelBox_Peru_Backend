spring:
  application:
    name: storage
  main:
    web-application-type: reactive
  profiles:
    default: local
  # Bootstrap de Azure Key Vault (Service Principal).
  # Estos valores SI son variables de entorno del runtime (no secretos de negocio).
  cloud:
    azure:
      credential:
        client-id: ${AZURE_CLIENT_ID:}
        client-secret: ${AZURE_CLIENT_SECRET:}
      profile:
        tenant-id: ${AZURE_TENANT_ID:}
      keyvault:
        secret:
          # Flag principal:
          # - true: carga secretos desde Azure Key Vault en runtime.
          # - false: usa fallback local via variables de entorno.
          property-source-enabled: ${AZURE_KEYVAULT_ENABLED:false}
          property-sources:
            - endpoint: ${AZURE_KEYVAULT_ENDPOINT:https://kvtravelboxpe.vault.azure.net/}
  datasource:
    # Base neutral: cada perfil (local/prod) define sus credenciales reales.
    url: "${DB_URL:}"
    username: "${DB_USERNAME:}"
    password: "${DB_PASSWORD:}"
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    hikari:
      pool-name: ${DB_POOL_NAME:travelbox-hikari}
      auto-commit: false
      maximum-pool-size: ${DB_POOL_MAX_SIZE:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
      validation-timeout: ${DB_POOL_VALIDATION_TIMEOUT_MS:5000}
      initialization-fail-timeout: ${DB_POOL_INIT_FAIL_TIMEOUT_MS:10000}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME_MS:1500000}
      keepalive-time: ${DB_POOL_KEEPALIVE_MS:300000}
      leak-detection-threshold: ${DB_POOL_LEAK_DETECTION_MS:0}
      data-source-properties:
        tcpKeepAlive: ${DB_PG_TCP_KEEP_ALIVE:true}
        reWriteBatchedInserts: ${DB_PG_REWRITE_BATCHED_INSERTS:true}
        preparedStatementCacheQueries: ${DB_PG_PREPARED_STATEMENT_CACHE_QUERIES:256}
        preparedStatementCacheSizeMiB: ${DB_PG_PREPARED_STATEMENT_CACHE_SIZE_MIB:5}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      jakarta:
        persistence:
          query:
            timeout: 25000
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  webflux:
    multipart:
      max-in-memory-size: 6MB
      max-disk-usage-per-part: 6MB
      max-parts: 20
  mvc:
    async:
      request-timeout: ${SERVER_ASYNC_TIMEOUT_MS:35000}
  task:
    scheduling:
      pool:
        size: ${APP_SCHEDULER_POOL_SIZE:4}
  lifecycle:
    timeout-per-shutdown-phase: ${APP_GRACEFUL_SHUTDOWN_TIMEOUT:30s}
  mail:
    # Prioridad: Key Vault (tbx-*) -> env local heredada (APP_SMTP_*).
    host: ${tbx-back-smtp-host:${APP_SMTP_HOST:smtp.gmail.com}}
    port: ${tbx-back-smtp-port:${APP_SMTP_PORT:587}}
    username: ${tbx-back-smtp-username:${APP_SMTP_USERNAME:}}
    password: ${tbx-back-smtp-password:${APP_SMTP_PASSWORD:}}
    properties:
      mail:
        smtp:
          auth: ${tbx-back-smtp-auth:${APP_SMTP_AUTH:true}}
          starttls:
            enable: ${tbx-back-smtp-starttls:${APP_SMTP_STARTTLS:true}}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  health:
    mail:
      enabled: false
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: ${PORT:8080}
  shutdown: graceful
  http2:
    enabled: ${SERVER_HTTP2_ENABLED:true}
  max-http-request-header-size: ${SERVER_MAX_HTTP_REQUEST_HEADER_SIZE:32KB}
  compression:
    enabled: true
    min-response-size: 1024
  tomcat:
    max-connections: ${SERVER_TOMCAT_MAX_CONNECTIONS:12000}
    accept-count: ${SERVER_TOMCAT_ACCEPT_COUNT:300}
    threads:
      max: ${SERVER_TOMCAT_THREADS_MAX:350}
      min-spare: ${SERVER_TOMCAT_THREADS_MIN_SPARE:30}
    connection-timeout: ${SERVER_TOMCAT_CONNECTION_TIMEOUT:10s}
    keep-alive-timeout: ${SERVER_TOMCAT_KEEP_ALIVE_TIMEOUT:20s}
    max-keep-alive-requests: ${SERVER_TOMCAT_MAX_KEEP_ALIVE_REQUESTS:1000}
  netty:
    idle-timeout: ${SERVER_NETTY_IDLE_TIMEOUT:45s}
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never
  forward-headers-strategy: framework

app:
  security:
    jwt:
      # Prioridad: Key Vault (tbx-*) -> env local heredada (APP_JWT_SECRET).
      secret: ${tbx-back-jwt-secret:${APP_JWT_SECRET:}}
      access-token-minutes: ${APP_JWT_ACCESS_MINUTES:30}
      refresh-token-days: ${APP_JWT_REFRESH_DAYS:7}
    rate-limit:
      auth:
        enabled: ${APP_AUTH_RATE_LIMIT_ENABLED:true}
        max-requests-per-window: ${APP_AUTH_RATE_LIMIT_MAX_REQUESTS:12}
        window-seconds: ${APP_AUTH_RATE_LIMIT_WINDOW_SECONDS:60}
        block-seconds: ${APP_AUTH_RATE_LIMIT_BLOCK_SECONDS:300}
    encryption-key: ${tbx-back-encryption-key:${APP_SECURITY_ENCRYPTION_KEY:}}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*,http://0.0.0.0:*}
  storage:
    local-dir: ${APP_STORAGE_LOCAL_DIR:uploads}
  inventory:
    office-pickup-late-grace-minutes: ${APP_INVENTORY_OFFICE_PICKUP_LATE_GRACE_MINUTES:30}
  public-base-url: ${APP_PUBLIC_BASE_URL:}
  frontend-base-url: ${APP_FRONTEND_BASE_URL:}
  email:
    # Prioridad: Key Vault (tbx-*) -> env local heredada (APP_EMAIL_*/APP_SMTP_*).
    provider: ${tbx-back-email-provider:${APP_EMAIL_PROVIDER:smtp}}
    from-address: ${tbx-back-email-from-address:${APP_EMAIL_FROM_ADDRESS:${tbx-back-smtp-username:${APP_SMTP_USERNAME:}}}}
    from-name: ${APP_EMAIL_FROM_NAME:TravelBox Peru}
    brand-name: ${APP_EMAIL_BRAND_NAME:TravelBox Peru}
    queue:
      enabled: ${tbx-back-email-queue-enabled:${APP_EMAIL_QUEUE_ENABLED:true}}
      poll-ms: ${APP_EMAIL_QUEUE_POLL_MS:3000}
      batch-size: ${APP_EMAIL_QUEUE_BATCH_SIZE:20}
      worker-threads: ${APP_EMAIL_QUEUE_WORKER_THREADS:4}
      max-attempts: ${APP_EMAIL_QUEUE_MAX_ATTEMPTS:5}
      retry-backoff-seconds: ${APP_EMAIL_QUEUE_RETRY_BACKOFF_SECONDS:30}
  http:
    client:
      connect-timeout-ms: ${APP_HTTP_CONNECT_TIMEOUT_MS:3000}
      read-timeout-ms: ${APP_HTTP_READ_TIMEOUT_MS:10000}
  reactive:
    blocking:
      max-threads: ${APP_BLOCKING_MAX_THREADS:96}
      max-queue: ${APP_BLOCKING_MAX_QUEUE:20000}
      thread-ttl-seconds: ${APP_BLOCKING_THREAD_TTL_SECONDS:60}
      timeout-ms: ${APP_BLOCKING_TIMEOUT_MS:30000}
  payments:
    provider: ${APP_PAYMENT_PROVIDER:culqi}
    force-cash-only: ${APP_PAYMENTS_FORCE_CASH_ONLY:false}
    allow-mock-confirmation: ${APP_PAYMENTS_ALLOW_MOCK_CONFIRMATION:true}
    currency: ${APP_PAYMENT_CURRENCY:PEN}
    refunds:
      commission-grace-minutes: ${APP_PAYMENT_REFUND_COMMISSION_GRACE_MINUTES:60}
      commission-percent-after-grace: ${APP_PAYMENT_REFUND_COMMISSION_PERCENT_AFTER_GRACE:4.50}
      minimum-fee: ${APP_PAYMENT_REFUND_MINIMUM_FEE:0.00}
    culqi:
      base-url: ${APP_CULQI_BASE_URL:https://api.culqi.com/v2}
      public-key: ${APP_CULQI_PUBLIC_KEY:}
      secret-key: ${APP_CULQI_SECRET_KEY:}
      webhook-secret: ${APP_CULQI_WEBHOOK_SECRET:}
  reservations:
    expiration-check-ms: ${APP_RESERVATION_EXPIRATION_CHECK_MS:300000}
    duplicate-window-seconds: ${APP_RESERVATION_DUPLICATE_WINDOW_SECONDS:60}
  notifications:
    provider: ${APP_NOTIFICATION_PROVIDER:mock}
  translation:
    provider: ${APP_TRANSLATION_PROVIDER:local}
    allow-fallback: ${APP_TRANSLATION_ALLOW_FALLBACK:true}
    cache-seconds: ${APP_TRANSLATION_CACHE_SECONDS:21600}
    google:
      base-url: ${APP_TRANSLATION_GOOGLE_BASE_URL:https://translation.googleapis.com}
      api-key: ${tbx-back-translation-google-api-key:${APP_TRANSLATION_GOOGLE_API_KEY:}}
      model: ${APP_TRANSLATION_GOOGLE_MODEL:nmt}
  auth:
    email-provider: ${tbx-back-auth-email-provider:${APP_AUTH_EMAIL_PROVIDER:${tbx-back-email-provider:${APP_EMAIL_PROVIDER:smtp}}}}
  routing:
    # provider/base-url/masks son config operativa (no secretos).
    provider: ${APP_ROUTING_PROVIDER:mock}
    allow-mock-fallback: ${APP_ROUTING_ALLOW_MOCK_FALLBACK:true}
    osrm:
      base-url: ${APP_ROUTING_OSRM_BASE_URL:https://router.project-osrm.org}
      profile: ${APP_ROUTING_OSRM_PROFILE:driving}
    google:
      base-url: ${APP_ROUTING_GOOGLE_BASE_URL:https://routes.googleapis.com}
      # Prioridad: Key Vault (tbx-*) -> env local heredada (APP_ROUTING_GOOGLE_API_KEY).
      api-key: ${tbx-back-routing-google-api-key:${APP_ROUTING_GOOGLE_API_KEY:}}
      field-mask: ${APP_ROUTING_GOOGLE_FIELD_MASK:routes.duration,routes.distanceMeters,routes.polyline.encodedPolyline}
  ops:
    qr-pin:
      pin-expiry-minutes: ${APP_OPS_QR_PIN_EXPIRY_MINUTES:15}
      max-pin-attempts: ${APP_OPS_QR_MAX_PIN_ATTEMPTS:5}
      pin-lock-seconds: ${APP_OPS_QR_PIN_LOCK_SECONDS:300}
      bag-tag-prefix: ${APP_OPS_QR_BAG_TAG_PREFIX:BAG}
  bootstrap:
    seed-operational-demo: ${APP_BOOTSTRAP_SEED_OPERATIONAL_DEMO:false}
  firebase:
    # Prioridad: Key Vault (tbx-*) -> env local heredada (APP_FIREBASE_*).
    enabled: ${tbx-back-firebase-enabled:${APP_FIREBASE_ENABLED:true}}
    project-id: ${tbx-back-firebase-project-id:${APP_FIREBASE_PROJECT_ID:}}
    storage-bucket: ${tbx-back-firebase-storage-bucket:${APP_FIREBASE_STORAGE_BUCKET:}}
    # Fallback opcional para local si usas archivo JSON.
    service-account-file: ${APP_FIREBASE_SERVICE_ACCOUNT_FILE:}
    service-account-json: '${tbx-back-firebase-sa-json:${APP_FIREBASE_SERVICE_ACCOUNT_JSON:}}'
    # Flags no sensibles: se mantienen como config operativa.
    user-migration:
      enabled: ${APP_FIREBASE_USER_MIGRATION_ENABLED:false}
      fail-fast: ${APP_FIREBASE_USER_MIGRATION_FAIL_FAST:false}
    firestore:
      client-profile-collection: ${APP_FIREBASE_CLIENT_PROFILE_COLLECTION:clientProfiles}

azure:
  storage:
    images:
      connection-string: ${tbx-back-azure-storage-images-connection-string:${AZURE_STORAGE_IMAGES_CONNECTION_STRING:}}
      url-base: ${AZURE_STORAGE_IMAGES_URL_BASE:}
      container:
        images: ${AZURE_STORAGE_IMAGES_CONTAINER:travelbox-images}
        profiles: ${AZURE_STORAGE_PROFILES_CONTAINER:travelbox-profiles}
        warehouses: ${AZURE_STORAGE_WAREHOUSES_CONTAINER:travelbox-warehouses}
        documents: ${AZURE_STORAGE_DOCUMENTS_CONTAINER:travelbox-documents}
    reports:
      connection-string: ${tbx-back-azure-storage-reports-connection-string:${AZURE_STORAGE_REPORTS_CONNECTION_STRING:}}
      url-base: ${AZURE_STORAGE_REPORTS_URL_BASE:}
      container:
        reports: ${AZURE_STORAGE_REPORTS_CONTAINER:travelbox-reports}
        exports: ${AZURE_STORAGE_EXPORTS_CONTAINER:travelbox-exports}
