name: Backend API Contract Live

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "tools/live_api_contract_check.sh"
      - ".github/workflows/backend-api-contract-live.yml"

env:
  AZURE_KEYVAULT_NAME: kvtravelboxpe

jobs:
  api-contract-live:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_JSON }}

      - name: Load secrets from Azure Key Vault
        shell: bash
        run: |
          set -euo pipefail
          
          is_placeholder() {
            local val="${1,,}"
            val="${val// /}"
            [[ "$val" =~ ^(changeme|change-me|replace-me|placeholder|dummy|todo|tbd|__pending_meta__)$ ]]
          }
          
          load_secret() {
            local secret_name="$1"
            local env_var="$2"
            local value
            value="$(az keyvault secret show --vault-name "${AZURE_KEYVAULT_NAME}" --name "${secret_name}" --query value -o tsv 2>/dev/null || true)"
            if [[ -z "$value" ]]; then
              echo "ERROR: Secret not found in Key Vault: ${secret_name}" >&2
              exit 1
            fi
            if is_placeholder "$value"; then
              echo "ERROR: Secret has placeholder value: ${secret_name}" >&2
              exit 1
            fi
            echo "${env_var}=${value}" >> "${GITHUB_ENV}"
            echo "Loaded: ${secret_name}"
          }
          
          echo "Loading secrets from Key Vault: ${AZURE_KEYVAULT_NAME}"
          load_secret "tbx-e2e-live-api-base-url" "LIVE_API_BASE_URL"
          load_secret "tbx-e2e-admin-email" "E2E_ADMIN_EMAIL"
          load_secret "tbx-e2e-admin-password" "E2E_ADMIN_PASSWORD"
          load_secret "tbx-e2e-client-email" "E2E_CLIENT_EMAIL"
          load_secret "tbx-e2e-client-password" "E2E_CLIENT_PASSWORD"

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run live API contract checks
        run: |
          chmod +x tools/live_api_contract_check.sh
          tools/live_api_contract_check.sh
