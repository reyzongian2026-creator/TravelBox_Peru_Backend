name: Backend Quality Gate

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "pom.xml"
      - ".github/workflows/backend-quality-gate.yml"
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "pom.xml"
      - ".github/workflows/backend-quality-gate.yml"
  workflow_dispatch:

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Ensure Maven wrapper executable
        run: chmod +x mvnw

      - name: Unit and integration tests
        run: ./mvnw -B test
