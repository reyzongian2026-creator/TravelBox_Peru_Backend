name: Deploy Backend to Azure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build JAR
        run: |
          chmod +x ./mvnw
          ./mvnw package -DskipTests -q

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        run: |
          az webapp deploy \
            --name travelbox-backend-prod \
            --resource-group travelbox-peru-rg \
            --type jar \
            --src-path target/storage-*.jar \
            --async:true
        shell: bash

      - name: Restart App Service
        run: az webapp restart --name travelbox-backend-prod --resource-group travelbox-peru-rg
