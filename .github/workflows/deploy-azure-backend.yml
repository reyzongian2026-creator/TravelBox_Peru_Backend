name: Deploy Backend to Azure

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "pom.xml"
      - ".github/workflows/deploy-azure-backend.yml"
  workflow_dispatch:

env:
  AZURE_SUBSCRIPTION: "33815caa-4cfb-4a9e-b60a-8fee5caa2b08"
  RESOURCE_GROUP: "travelbox-peru-rg"
  WEBAPP_NAME: "travelbox-backend-prod"
  KEY_VAULT_NAME: "kvtravelboxpe"
  JAVA_VERSION: "21"
  APP_ENV: "prod"

permissions:
  contents: read
  id-token: write

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Login Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_JSON }}

      - name: Load production secrets from Key Vault
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          az account set --subscription "${{ env.AZURE_SUBSCRIPTION }}"
          $vault = "${{ env.KEY_VAULT_NAME }}"
          $map = @(
            @{ secret = "tbx-back-db-url"; env = "TBX_BACK_DB_URL"; required = $true },
            @{ secret = "tbx-back-db-username"; env = "TBX_BACK_DB_USERNAME"; required = $true },
            @{ secret = "tbx-back-db-password"; env = "TBX_BACK_DB_PASSWORD"; required = $true },
            @{ secret = "tbx-back-jwt-secret"; env = "TBX_BACK_JWT_SECRET"; required = $true },
            @{ secret = "tbx-back-email-graph-tenant-id"; env = "TBX_BACK_EMAIL_GRAPH_TENANT_ID"; required = $false },
            @{ secret = "tbx-back-email-graph-client-id"; env = "TBX_BACK_EMAIL_GRAPH_CLIENT_ID"; required = $false },
            @{ secret = "tbx-back-email-graph-client-secret"; env = "TBX_BACK_EMAIL_GRAPH_CLIENT_SECRET"; required = $false },
            @{ secret = "tbx-back-routing-azure-maps-key"; env = "TBX_BACK_ROUTING_AZURE_MAPS_KEY"; required = $false },
            @{ secret = "tbx-back-translation-azure-api-key"; env = "TBX_BACK_TRANSLATION_AZURE_API_KEY"; required = $false },
            @{ secret = "tbx-back-payments-izipay-merchant-code"; env = "TBX_BACK_PAYMENTS_IZIPAY_MERCHANT_CODE"; required = $false },
            @{ secret = "tbx-back-payments-izipay-public-key"; env = "TBX_BACK_PAYMENTS_IZIPAY_PUBLIC_KEY"; required = $false },
            @{ secret = "tbx-back-payments-izipay-hash-key"; env = "TBX_BACK_PAYMENTS_IZIPAY_HASH_KEY"; required = $false },
            @{ secret = "tbx-back-payments-izipay-api-user"; env = "TBX_BACK_PAYMENTS_IZIPAY_API_USER"; required = $false },
            @{ secret = "tbx-back-payments-izipay-api-password"; env = "TBX_BACK_PAYMENTS_IZIPAY_API_PASSWORD"; required = $false },
            @{ secret = "tbx-back-payments-izipay-api-base-url"; env = "TBX_BACK_PAYMENTS_IZIPAY_API_BASE_URL"; required = $false },
            @{ secret = "tbx-back-payments-izipay-checkout-script-url"; env = "TBX_BACK_PAYMENTS_IZIPAY_CHECKOUT_SCRIPT_URL"; required = $false }
          )

          foreach ($item in $map) {
            $value = az keyvault secret show --vault-name $vault --name $item.secret --query value -o tsv 2>$null
            if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($value)) {
              if ($item.required) {
                throw "Falta secret requerido en Key Vault: $($item.secret)"
              }
              continue
            }
            "$($item.env)=$value" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          }

      - name: Run tests
        run: |
          chmod +x mvnw
          ./mvnw -B -ntp test

      - name: Build JAR
        run: ./mvnw -B -ntp clean package -DskipTests
        env:
          SPRING_PROFILES_ACTIVE: ${{ env.APP_ENV }}

      - name: Resolve JAR artifact
        id: jar
        run: |
          JAR_PATH=$(find target -maxdepth 1 -type f -name "*.jar" ! -name "*.jar.original" | head -n 1)
          if [ -z "$JAR_PATH" ]; then
            echo "No JAR artifact found in target/"
            exit 1
          fi
          echo "jar_path=$JAR_PATH" >> "$GITHUB_OUTPUT"

      - name: Deploy JAR to Azure App Service
        run: |
          az webapp deploy \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.WEBAPP_NAME }} \
            --type jar \
            --src-path "${{ steps.jar.outputs.jar_path }}"

      - name: Configure App Settings
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $props = [ordered]@{
            "SPRING_PROFILES_ACTIVE"                         = "prod"
            "SERVER_PORT"                                    = "8080"
            "WEBSITES_PORT"                                  = "8080"
            "APP_PUBLIC_BASE_URL"                            = "https://api.inkavoy.pe"
            "APP_FRONTEND_BASE_URL"                          = "https://www.inkavoy.pe"
            "APP_TRANSLATION_PROVIDER"                       = "azure"
            "APP_ROUTING_PROVIDER"                           = "azure"
            "APP_EMAIL_PROVIDER"                             = "graph"
            "APP_AUTH_EMAIL_PROVIDER"                        = "graph"
            "APP_PAYMENTS_ALLOW_MOCK_CONFIRMATION"           = "false"
            "APP_AUTH_EXPOSE_CODE_PREVIEW"                   = "false"
            "AZURE_KEYVAULT_ENABLED"                         = "true"
            "AZURE_KEYVAULT_ENDPOINT"                        = "https://kvtravelboxpe.vault.azure.net/"
            "tbx-back-db-url"                                = $env:TBX_BACK_DB_URL
            "tbx-back-db-username"                           = $env:TBX_BACK_DB_USERNAME
            "tbx-back-db-password"                           = $env:TBX_BACK_DB_PASSWORD
            "tbx-back-jwt-secret"                            = $env:TBX_BACK_JWT_SECRET
            "tbx-back-email-graph-tenant-id"                 = $env:TBX_BACK_EMAIL_GRAPH_TENANT_ID
            "tbx-back-email-graph-client-id"                 = $env:TBX_BACK_EMAIL_GRAPH_CLIENT_ID
            "tbx-back-email-graph-client-secret"             = $env:TBX_BACK_EMAIL_GRAPH_CLIENT_SECRET
            "tbx-back-routing-azure-maps-key"                = $env:TBX_BACK_ROUTING_AZURE_MAPS_KEY
            "tbx-back-translation-azure-api-key"             = $env:TBX_BACK_TRANSLATION_AZURE_API_KEY
            "tbx-back-payments-izipay-merchant-code"         = $env:TBX_BACK_PAYMENTS_IZIPAY_MERCHANT_CODE
            "tbx-back-payments-izipay-public-key"            = $env:TBX_BACK_PAYMENTS_IZIPAY_PUBLIC_KEY
            "tbx-back-payments-izipay-hash-key"              = $env:TBX_BACK_PAYMENTS_IZIPAY_HASH_KEY
            "tbx-back-payments-izipay-api-user"              = $env:TBX_BACK_PAYMENTS_IZIPAY_API_USER
            "tbx-back-payments-izipay-api-password"          = $env:TBX_BACK_PAYMENTS_IZIPAY_API_PASSWORD
            "tbx-back-payments-izipay-api-base-url"          = $env:TBX_BACK_PAYMENTS_IZIPAY_API_BASE_URL
            "tbx-back-payments-izipay-checkout-script-url"   = $env:TBX_BACK_PAYMENTS_IZIPAY_CHECKOUT_SCRIPT_URL
          }

          # Remove entries with null/empty values (optional secrets not in Key Vault)
          $clean = [ordered]@{}
          foreach ($kv in $props.GetEnumerator()) {
            if (-not [string]::IsNullOrWhiteSpace($kv.Value)) {
              $clean[$kv.Key] = $kv.Value
            }
          }

          # Write JSON body and call REST API (avoids CLI key=value parsing issues)
          $body = @{ properties = $clean } | ConvertTo-Json -Depth 3
          $bodyFile = Join-Path $env:RUNNER_TEMP "appsettings.json"
          $body | Out-File -FilePath $bodyFile -Encoding utf8

          $url = "/subscriptions/${{ env.AZURE_SUBSCRIPTION }}/resourceGroups/${{ env.RESOURCE_GROUP }}/providers/Microsoft.Web/sites/${{ env.WEBAPP_NAME }}/config/appsettings?api-version=2022-03-01"
          az rest --method PUT --url $url --body "@$bodyFile"
          Write-Host "App settings configured ($($clean.Count) settings applied)."

      - name: Restart backend app
        run: az webapp restart --resource-group ${{ env.RESOURCE_GROUP }} --name ${{ env.WEBAPP_NAME }}
