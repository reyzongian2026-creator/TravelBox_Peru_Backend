name: Deploy Backend to Azure

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "pom.xml"
      - ".github/workflows/deploy-azure-backend.yml"
  workflow_dispatch:

env:
  AZURE_SUBSCRIPTION: "33815caa-4cfb-4a9e-b60a-8fee5caa2b08"
  RESOURCE_GROUP: "travelbox-peru-rg"
  WEBAPP_NAME: "travelbox-backend-prod"
  KEY_VAULT_NAME: "kvtravelboxpe"
  JAVA_VERSION: "21"
  APP_ENV: "prod"

permissions:
  contents: read
  id-token: write

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Login Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_JSON }}

      - name: Set Azure subscription
        run: az account set --subscription "${{ env.AZURE_SUBSCRIPTION }}"

      - name: Run tests
        run: |
          chmod +x mvnw
          ./mvnw -B -ntp test

      - name: Build JAR
        run: ./mvnw -B -ntp clean package -DskipTests
        env:
          SPRING_PROFILES_ACTIVE: ${{ env.APP_ENV }}

      - name: Resolve JAR artifact
        id: jar
        run: |
          JAR_PATH=$(find target -maxdepth 1 -type f -name "*.jar" ! -name "*.jar.original" | head -n 1)
          if [ -z "$JAR_PATH" ]; then
            echo "No JAR artifact found in target/"
            exit 1
          fi
          echo "jar_path=$JAR_PATH" >> "$GITHUB_OUTPUT"

      - name: Deploy JAR to Azure App Service
        run: |
          az webapp deploy \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.WEBAPP_NAME }} \
            --type jar \
            --src-path "${{ steps.jar.outputs.jar_path }}"

      - name: Configure App Settings
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          # Only set platform/app-level settings here.
          # Secrets (tbx-back-*) are read directly from Key Vault by the app
          # via AZURE_KEYVAULT_ENABLED + AZURE_KEYVAULT_ENDPOINT.
          $props = [ordered]@{
            "SPRING_PROFILES_ACTIVE"               = "prod"
            "SERVER_PORT"                          = "8080"
            "WEBSITES_PORT"                        = "8080"
            "APP_PUBLIC_BASE_URL"                  = "https://api.inkavoy.pe"
            "APP_FRONTEND_BASE_URL"                = "https://www.inkavoy.pe"
            "APP_TRANSLATION_PROVIDER"             = "azure"
            "APP_ROUTING_PROVIDER"                 = "azure"
            "APP_EMAIL_PROVIDER"                   = "graph"
            "APP_AUTH_EMAIL_PROVIDER"              = "graph"
            "APP_PAYMENTS_ALLOW_MOCK_CONFIRMATION" = "false"
            "APP_AUTH_EXPOSE_CODE_PREVIEW"         = "false"
            "AZURE_KEYVAULT_ENABLED"               = "true"
            "AZURE_KEYVAULT_ENDPOINT"              = "https://kvtravelboxpe.vault.azure.net/"
          }

          $body = @{ properties = $props } | ConvertTo-Json -Depth 3
          $bodyFile = Join-Path $env:RUNNER_TEMP "appsettings.json"
          $body | Out-File -FilePath $bodyFile -Encoding utf8

          $url = "/subscriptions/${{ env.AZURE_SUBSCRIPTION }}/resourceGroups/${{ env.RESOURCE_GROUP }}/providers/Microsoft.Web/sites/${{ env.WEBAPP_NAME }}/config/appsettings?api-version=2022-03-01"
          az rest --method PUT --url $url --body "@$bodyFile"
          Write-Host "App settings configured ($($props.Count) settings applied)."

      - name: Restart backend app
        run: az webapp restart --resource-group ${{ env.RESOURCE_GROUP }} --name ${{ env.WEBAPP_NAME }}
