name: Deploy to Azure (Backend)

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "pom.xml"
      - ".github/workflows/deploy-azure-backend.yml"
  workflow_dispatch:
    inputs:
      app_env:
        description: "Environment (dev/staging/prod)"
        required: true
        default: prod
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  APP_ENV: ${{ inputs.app_env || 'prod' }}
  AZURE_SUBSCRIPTION: "33815caa-4cfb-4a9e-b60a-8fee5caa2b08"
  RESOURCE_GROUP: "travelbox-peru-rg"
  WEBAPP_NAME: "travelbox-backend-prod"
  JAVA_VERSION: "21"

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Login Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_JSON }}

      - name: Get secrets from Key Vault
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          az account set --subscription "${{ env.AZURE_SUBSCRIPTION }}"
          $secrets = @{
            "DB_HOST" = (az keyvault secret show --vault-name "kvtravelboxpe" --name "tbx-new-db-host" --query value -o tsv)
            "DB_NAME" = (az keyvault secret show --vault-name "kvtravelboxpe" --name "tbx-new-db-name" --query value -o tsv)
            "DB_USERNAME" = (az keyvault secret show --vault-name "kvtravelboxpe" --name "tbx-new-db-username" --query value -o tsv)
            "DB_PASSWORD" = (az keyvault secret show --vault-name "kvtravelboxpe" --name "tbx-new-db-password" --query value -o tsv)
            "JWT_SECRET" = (az keyvault secret show --vault-name "kvtravelboxpe" --name "tbx-back-jwt-secret" --query value -o tsv)
            "IZIPAY_MERCHANT_CODE" = (az keyvault secret show --vault-name "kvtravelboxpe" --name "tbx-back-payments-izipay-merchant-code" --query value -o tsv)
            "IZIPAY_PUBLIC_KEY" = (az keyvault secret show --vault-name "kvtravelboxpe" --name "tbx-back-payments-izipay-public-key" --query value -o tsv)
            "IZIPAY_HASH_KEY" = (az keyvault secret show --vault-name "kvtravelboxpe" --name "tbx-back-payments-izipay-hash-key" --query value -o tsv)
            "IZIPAY_API_USER" = (az keyvault secret show --vault-name "kvtravelboxpe" --name "tbx-back-payments-izipay-api-user" --query value -o tsv)
            "IZIPAY_API_PASSWORD" = (az keyvault secret show --vault-name "kvtravelboxpe" --name "tbx-back-payments-izipay-api-password" --query value -o tsv)
          }
          foreach ($kv in $secrets.GetEnumerator()) {
            Write-Output "$($kv.Key)=$($kv.Value)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          }

      - name: Ensure Maven wrapper executable
        run: chmod +x mvnw

      - name: Build with Maven
        run: ./mvnw -B package -DskipTests
        env:
          SPRING_PROFILES_ACTIVE: ${{ env.APP_ENV }}

      - name: Resolve JAR artifact
        id: jar
        run: |
          JAR_PATH=$(find target -maxdepth 1 -type f -name "*.jar" ! -name "*.jar.original" | head -n 1)
          if [ -z "$JAR_PATH" ]; then
            echo "No JAR artifact found in target/"
            exit 1
          fi
          echo "jar_path=$JAR_PATH" >> "$GITHUB_OUTPUT"

      - name: Deploy to Azure App Service
        run: |
          az webapp deploy \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.WEBAPP_NAME }} \
            --type jar \
            --src-path "${{ steps.jar.outputs.jar_path }}"

      - name: Configure App Settings
        shell: pwsh
        run: |
          $dbUrl = "jdbc:postgresql://" + $env:DB_HOST + ":5432/" + $env:DB_NAME + "?sslmode=require"
          az webapp config appsettings set `
            --resource-group ${{ env.RESOURCE_GROUP }} `
            --name ${{ env.WEBAPP_NAME }} `
            --settings `
              SPRING_PROFILES_ACTIVE=${{ env.APP_ENV }} `
              APP_PUBLIC_BASE_URL="https://travelbox-backend-prod.azurewebsites.net" `
              tbx-back-db-url="$dbUrl" `
              tbx-back-db-username="$env:DB_USERNAME" `
              tbx-back-db-password="$env:DB_PASSWORD" `
              tbx-back-jwt-secret="$env:JWT_SECRET" `
              tbx-back-payments-izipay-merchant-code="$env:IZIPAY_MERCHANT_CODE" `
              tbx-back-payments-izipay-public-key="$env:IZIPAY_PUBLIC_KEY" `
              tbx-back-payments-izipay-hash-key="$env:IZIPAY_HASH_KEY" `
              tbx-back-payments-izipay-api-user="$env:IZIPAY_API_USER" `
              tbx-back-payments-izipay-api-password="$env:IZIPAY_API_PASSWORD" `
              WEBSITES_PORT=80

      - name: Restart App Service
        run: |
          az webapp restart --resource-group ${{ env.RESOURCE_GROUP }} --name ${{ env.WEBAPP_NAME }}
