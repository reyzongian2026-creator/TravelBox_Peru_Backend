name: Deploy Backend to Azure

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "pom.xml"
      - ".github/workflows/deploy-azure-backend.yml"
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

env:
  AZURE_SUBSCRIPTION: "33815caa-4cfb-4a9e-b60a-8fee5caa2b08"
  RESOURCE_GROUP: "travelbox-peru-rg"
  WEBAPP_NAME: "travelbox-backend-prod"
  KEY_VAULT_NAME: "kvtravelboxpe"
  JAVA_VERSION: "21"
  APP_ENV: "prod"

permissions:
  contents: read
  id-token: write

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Login Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_JSON }}

      - name: Set Azure subscription
        run: az account set --subscription "${{ env.AZURE_SUBSCRIPTION }}"

      - name: Run tests
        run: |
          chmod +x mvnw
          ./mvnw -B -ntp test

      - name: Build JAR
        run: ./mvnw -B -ntp clean package -DskipTests
        env:
          SPRING_PROFILES_ACTIVE: ${{ env.APP_ENV }}

      - name: Resolve JAR artifact
        id: jar
        run: |
          JAR_PATH=$(find target -maxdepth 1 -type f -name "*.jar" ! -name "*.jar.original" | head -n 1)
          if [ -z "$JAR_PATH" ]; then
            echo "No JAR artifact found in target/"
            exit 1
          fi
          echo "jar_path=$JAR_PATH" >> "$GITHUB_OUTPUT"

      - name: Deploy JAR via Kudu publish API
        run: |
          TOKEN=$(az account get-access-token --query accessToken -o tsv)
          SCM_URL="https://${{ env.WEBAPP_NAME }}.scm.azurewebsites.net"
          JAR="${{ steps.jar.outputs.jar_path }}"
          echo "Uploading JAR ($(du -h "$JAR" | cut -f1)) to Kudu..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${SCM_URL}/api/publish?type=jar&restart=true" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"${JAR}" \
            --max-time 300)
          echo "Kudu response: ${HTTP_CODE}"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Deploy failed with HTTP ${HTTP_CODE}"
            exit 1
          fi
          echo "JAR deployed successfully, app is restarting..."

      - name: Configure App Settings
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          # Only set platform/app-level settings here.
          # Secrets (tbx-back-*) are read directly from Key Vault by the app
          # via AZURE_KEYVAULT_ENABLED + AZURE_KEYVAULT_ENDPOINT.
          $props = [ordered]@{
            "SPRING_PROFILES_ACTIVE"               = "prod"
            "SERVER_PORT"                          = "8080"
            "WEBSITES_PORT"                        = "8080"
            "APP_PUBLIC_BASE_URL"                  = "https://api.inkavoy.pe"
            "APP_FRONTEND_BASE_URL"                = "https://www.inkavoy.pe"
            "APP_TRANSLATION_PROVIDER"             = "azure"
            "APP_ROUTING_PROVIDER"                 = "azure"
            "APP_EMAIL_PROVIDER"                   = "graph"
            "APP_AUTH_EMAIL_PROVIDER"              = "graph"
            "APP_PAYMENTS_ALLOW_MOCK_CONFIRMATION" = "false"
            "APP_AUTH_EXPOSE_CODE_PREVIEW"         = "false"
            "AZURE_KEYVAULT_ENABLED"               = "true"
            "AZURE_KEYVAULT_ENDPOINT"              = "https://kvtravelboxpe.vault.azure.net/"
          }

          $body = @{ properties = $props } | ConvertTo-Json -Depth 3
          $bodyFile = Join-Path $env:RUNNER_TEMP "appsettings.json"
          $body | Out-File -FilePath $bodyFile -Encoding utf8

          $url = "/subscriptions/${{ env.AZURE_SUBSCRIPTION }}/resourceGroups/${{ env.RESOURCE_GROUP }}/providers/Microsoft.Web/sites/${{ env.WEBAPP_NAME }}/config/appsettings?api-version=2022-03-01"
          az rest --method PUT --url $url --body "@$bodyFile"
          Write-Host "App settings configured ($($props.Count) settings applied)."

      - name: Wait for app to start
        run: |
          echo "Waiting for backend to become healthy (app takes ~5 min to start)..."
          sleep 90
          for i in $(seq 1 50); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${{ env.WEBAPP_NAME }}.azurewebsites.net/actuator/health" --max-time 10 || true)
            if [ "$STATUS" = "200" ]; then
              echo "Backend is healthy (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/50 - status: $STATUS, retrying in 15s..."
            sleep 15
          done
          echo "Backend did not become healthy within 14 minutes"
          exit 1
