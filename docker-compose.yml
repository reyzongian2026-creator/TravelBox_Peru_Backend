services:
  postgres:
    image: postgres:16-alpine
    container_name: travelbox-postgres
    environment:
      POSTGRES_DB: travelbox
      POSTGRES_USER: travelbox
      POSTGRES_PASSWORD: travelbox
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travelbox -d travelbox"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
