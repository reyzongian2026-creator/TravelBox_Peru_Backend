services:
  postgres:
    image: postgres:16-alpine
    container_name: travelbox-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-travelbox}
      POSTGRES_USER: ${POSTGRES_USER:-travelbox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travelbox -d travelbox"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
